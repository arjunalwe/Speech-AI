<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi - Speech Therapy</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  /* Keeps the camera mirrored and hides inactive views */
  video { transform: scaleX(-1); }
  .view { display: none; animation: fadeIn 0.3s ease-out forwards; }
  .view.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex items-center justify-center p-4">

<div class="bg-white w-full max-w-2xl min-h-[600px] rounded-2xl shadow-xl p-8 relative overflow-hidden border border-gray-100">

  <div id="view-home" class="view active text-center mt-20">
    <h1 class="text-5xl font-extrabold text-indigo-600 tracking-tight mb-4">Lumi</h1>
    <p class="text-lg text-gray-500 mb-10">AI-powered speech guidance for your little one.</p>
    <button id="btn-go-register" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-full shadow-lg transition transform hover:-translate-y-0.5">
      Get Started
    </button>
  </div>

  <div id="view-register" class="view">
    <h2 class="text-3xl font-bold mb-2">Setup Profile</h2>
    <p class="text-gray-500 mb-8">How would you like to determine their focus areas?</p>
    
    <div class="space-y-4">
      <button id="btn-go-quiz" class="w-full bg-white border-2 border-indigo-100 hover:border-indigo-600 text-indigo-600 font-semibold py-4 px-6 rounded-xl transition flex justify-between items-center">
        <span>Manual Parent Quiz</span>
        <span>→</span>
      </button>
      <button id="btn-go-assessment" class="w-full bg-emerald-50 border-2 border-emerald-100 hover:border-emerald-500 text-emerald-700 font-semibold py-4 px-6 rounded-xl transition flex justify-between items-center">
        <span>AI Voice Assessment</span>
        <span>→</span>
      </button>
    </div>
  </div>

  <div id="view-quiz" class="view">
    <h2 class="text-2xl font-bold mb-6">Parent Questionnaire</h2>
    <div class="space-y-3">
      <label class="flex items-center p-4 border rounded-xl hover:bg-gray-50 cursor-pointer">
        <input type="radio" name="disorder" value="articulation" class="w-5 h-5 text-indigo-600">
        <span class="ml-3 font-medium">Struggles with R's, L's, or S's (Articulation)</span>
      </label>
      <label class="flex items-center p-4 border rounded-xl hover:bg-gray-50 cursor-pointer">
        <input type="radio" name="disorder" value="stuttering" class="w-5 h-5 text-indigo-600">
        <span class="ml-3 font-medium">Hesitates or gets stuck on words (Fluency)</span>
      </label>
      <label class="flex items-center p-4 border rounded-xl hover:bg-gray-50 cursor-pointer">
        <input type="radio" name="disorder" value="pragmatics" class="w-5 h-5 text-indigo-600">
        <span class="ml-3 font-medium">Struggles reading vocal emotion (Pragmatics)</span>
      </label>
    </div>
    <div class="mt-8 flex gap-4">
      <button id="btn-save-quiz" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-indigo-700">Save Profile</button>
      <button id="btn-back-register" class="text-gray-500 hover:text-gray-800 font-medium">Back</button>
    </div>
  </div>

  <div id="view-dashboard" class="view">
    <h2 class="text-2xl font-bold mb-6">Parent Dashboard</h2>
    
    <div class="bg-emerald-50 border border-emerald-200 p-4 rounded-xl mb-8">
      <h3 class="text-emerald-800 font-bold mb-1">Clinical Focus</h3>
      <p class="text-emerald-700">Lumi recommends focusing on: <span id="focus-area" class="font-bold uppercase text-emerald-900">...</span></p>
    </div>

    <h3 class="font-bold text-gray-700 mb-4">Today's Sessions</h3>
    <div class="grid grid-cols-1 gap-4">
      <button id="btn-play-articulation" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl shadow">Start Articulation Game</button>
      <button id="btn-play-stuttering" class="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl shadow">Start Fluency Game</button>
    </div>
  </div>

  <div id="view-practice" class="view">
    <div class="flex justify-between items-center mb-4">
      <h2 id="practice-title" class="text-xl font-bold text-gray-800">Practice Mode</h2>
      <button id="btn-end-session" class="text-red-500 hover:text-red-700 font-semibold text-sm">End Session</button>
    </div>
    
    <div class="bg-amber-50 border border-amber-200 p-4 rounded-xl text-center mb-6">
        <p class="text-xs font-bold text-amber-800 tracking-wider mb-1">TARGET WORD</p>
        <h3 id="practice-prompt" class="text-3xl font-extrabold text-amber-900">Rabbit</h3>
    </div>

    <div class="relative bg-black rounded-xl overflow-hidden shadow-inner mb-4">
      <video id="video-feed" autoplay playsinline muted class="w-full h-64 object-cover"></video>
      <div id="practice-status" class="absolute top-2 left-2 bg-black bg-opacity-50 text-white text-xs px-2 py-1 rounded">Ready</div>
    </div>

    <div class="flex gap-2 justify-center mb-6">
      <button id="btn-start-practice" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-6 rounded-full shadow">Start Attempt</button>
      <button id="btn-stop-practice" disabled class="bg-gray-400 text-white font-bold py-2 px-6 rounded-full">Stop</button>
    </div>

    <div id="visualization-container" class="bg-blue-50 border border-blue-100 p-4 rounded-xl flex gap-4 items-start">
        <div id="viseme-avatar" class="text-4xl bg-white p-2 rounded-full shadow-sm">🤖</div> 
        <div>
          <h4 class="font-bold text-indigo-700 mb-1">Lumi says:</h4>
          <p id="lumi-speech-bubble" class="text-sm text-gray-700 leading-relaxed">...</p>
        </div>
    </div>
  </div>

</div>

<script type="module" src="./script.js"></script>
</body>
</html>
